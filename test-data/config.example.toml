# Example zdb config wired to the three test-data databases.
# Copy to ~/.config/zdb/config.toml or run with:
#   ZDB_CONFIG=$(pwd)/test-data/config.example.toml go run ./cmd/zdb

[[connections]]
name   = "school-sqlite"
engine = "sqlite"
dsn    = "/tmp/dev.db"

[[connections]]
name   = "school-postgres"
engine = "postgres"
dsn    = "postgres://dev:dev@localhost:5432/school?sslmode=disable"

[[connections]]
name   = "school-mysql"
engine = "mysql"
dsn    = "dev:dev@tcp(127.0.0.1:3306)/school?parseTime=true"

